# AIアプリ開発ナレッジ共有ハブ — PoC ローカルDocker環境
#
# ホストへの公開ポートはデフォルトから +200 シフト（他プロジェクトとの衝突回避）
#
# サービス構成（左：ホスト公開 / 右：コンテナ内）：
#   app                3200 → 3000   Vite dev server
#   firebase-emulator  4200 → 4000   Emulator UI
#                      8280 → 8080   Firestore
#                      9299 → 9099   Auth
#   minio              9201 → 9001   Console（9000 は internal network のみ）
#   minio-init         oneshot bucket作成
#   og-proxy           8987 → 8787   OG取得 + MinIO署名URL発行
#
# MinIO のシークレットは og-proxy / minio / minio-init のみが触る。
# SPA (app) には絶対に渡さない（VITE_* で渡すとビルド成果物に埋め込まれるため）。

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: aidev-app
    working_dir: /app
    ports:
      - "3200:3000"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      firebase-emulator:
        condition: service_started
      og-proxy:
        condition: service_started
    networks:
      - aidev

  firebase-emulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.emulator
    container_name: aidev-firebase-emulator
    working_dir: /workspace
    ports:
      - "9299:9099"   # Auth      (host 9299 → container 9099)
      - "8280:8080"   # Firestore (host 8280 → container 8080)
      - "4200:4000"   # Emulator UI (host 4200 → container 4000)
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - ./firestore.rules:/workspace/firestore.rules:ro
      - ./firestore.indexes.json:/workspace/firestore.indexes.json:ro
      - ./.firebaserc:/workspace/.firebaserc:ro
      - ./.emulator-data:/workspace/.emulator-data
    stop_grace_period: 30s
    networks:
      - aidev

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: aidev-minio
    command: server /data --console-address ":9001"
    # ホストへは Console のみ公開。9000 は Docker network 内部だけ
    ports:
      - "9201:9001"  # Console (host 9201 → container 9001)
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - aidev

  minio-init:
    image: minio/mc:RELEASE.2024-09-09T08-21-26Z
    container_name: aidev-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-aidev-uploads}
    entrypoint: ["/bin/sh", "/init/init.sh"]
    volumes:
      - ./docker/minio/init.sh:/init/init.sh:ro
    networks:
      - aidev

  og-proxy:
    build:
      context: ./docker/og-proxy
      dockerfile: Dockerfile
    container_name: aidev-og-proxy
    ports:
      - "8987:8787"  # host 8987 → container 8787
    environment:
      PORT: 8787
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-aidev-uploads}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-aidev-knowledge-dev}
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      GCLOUD_PROJECT: ${FIREBASE_PROJECT_ID:-aidev-knowledge-dev}
    depends_on:
      minio:
        condition: service_healthy
      firebase-emulator:
        condition: service_started
    networks:
      - aidev

volumes:
  app_node_modules:
  minio_data:

networks:
  aidev:
    driver: bridge
