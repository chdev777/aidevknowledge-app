# AIアプリ開発ナレッジ共有ハブ — PoC ローカルDocker環境
#
# サービス構成：
#   app                Vite dev server :3000
#   firebase-emulator  Auth :9099 / Firestore :8080 / UI :4000
#   minio              S3互換ストレージ（Console :9001 のみホスト公開）
#   minio-init         oneshot bucket作成
#   og-proxy           OG取得 + MinIO署名URL発行 :8787
#
# MinIO のシークレットは og-proxy / minio / minio-init のみが触る。
# SPA (app) には絶対に渡さない（VITE_* で渡すとビルド成果物に埋め込まれるため）。

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: aidev-app
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      firebase-emulator:
        condition: service_started
      og-proxy:
        condition: service_started
    networks:
      - aidev

  firebase-emulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.emulator
    container_name: aidev-firebase-emulator
    working_dir: /workspace
    ports:
      - "9099:9099"   # Auth
      - "8080:8080"   # Firestore
      - "4000:4000"   # Emulator UI
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - ./firestore.rules:/workspace/firestore.rules:ro
      - ./firestore.indexes.json:/workspace/firestore.indexes.json:ro
      - ./.firebaserc:/workspace/.firebaserc:ro
      - ./.emulator-data:/workspace/.emulator-data
    stop_grace_period: 30s
    networks:
      - aidev

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: aidev-minio
    command: server /data --console-address ":9001"
    # ホストへは Console (9001) のみ公開。9000 は Docker network 内部だけ
    ports:
      - "9001:9001"
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - aidev

  minio-init:
    image: minio/mc:RELEASE.2024-09-09T08-21-26Z
    container_name: aidev-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-aidev-uploads}
    entrypoint: ["/bin/sh", "/init/init.sh"]
    volumes:
      - ./docker/minio/init.sh:/init/init.sh:ro
    networks:
      - aidev

  og-proxy:
    build:
      context: ./docker/og-proxy
      dockerfile: Dockerfile
    container_name: aidev-og-proxy
    ports:
      - "8787:8787"
    environment:
      PORT: 8787
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-aidev-uploads}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-aidev-knowledge-dev}
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      GCLOUD_PROJECT: ${FIREBASE_PROJECT_ID:-aidev-knowledge-dev}
    depends_on:
      minio:
        condition: service_healthy
      firebase-emulator:
        condition: service_started
    networks:
      - aidev

volumes:
  app_node_modules:
  minio_data:

networks:
  aidev:
    driver: bridge
