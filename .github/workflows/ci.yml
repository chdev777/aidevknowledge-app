name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同じブランチで連続 push された場合は古い実行を打ち切る
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  lint:
    name: Lint (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

  unit-test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  rules-test:
    name: Firestore Rules tests
    runs-on: ubuntu-latest
    env:
      # helpers.ts は FIRESTORE_EMULATOR_HOST を見て emulator に接続する
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Firebase Emulator は JVM 上で動く
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # firebase emulators:exec は emulator を起動 → コマンド実行 → 自動停止する
      # --project は firebase.json singleProjectMode 下でも明示が安全
      - name: Run rules tests via emulator
        run: |
          pnpm dlx firebase-tools@latest emulators:exec \
            --only firestore \
            --project aidev-knowledge-test \
            "pnpm test:rules"
